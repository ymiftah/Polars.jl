repos:
  - repo: https://github.com/fredrikekre/runic-pre-commit
    rev: v2.2.0
    hooks:
      - id: runic

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (c-polars)
        description: Check Rust formatting in the c-polars FFI crate.
        entry: bash -c 'cd c-polars && cargo fmt -- --check'
        language: system
        files: ^c-polars/.*\.rs$
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy (c-polars)
        description: Lint the c-polars FFI crate with clippy.
        entry: bash -c 'cd c-polars && cargo clippy --all-targets -- -D warnings'
        language: system
        files: ^c-polars/.*\.rs$
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.8
    hooks:
      - id: clang-format
        name: clang-format (c-polars headers)
        files: ^c-polars/include/.*\.h$
