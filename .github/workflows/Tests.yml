name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - name: Run pre-commit
        run: uvx --with "pre-commit>=4.1.0" pre-commit run --all-files

      - name: Check the C header matches the Rust FFI surface
        run: python3 c-polars/check_header_drift.py

      - name: Check generated API bindings are up to date
        run: |
          julia --project=gen -e 'import Pkg; Pkg.instantiate()'
          julia --project=gen gen/generate.jl
          uvx --with "pre-commit>=4.1.0" pre-commit run runic --files src/api/generated.jl || true
          git diff --exit-code -- src/api/generated.jl

  rust:
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./c-polars"
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: ./c-polars
      - name: Rustfmt
        run: cargo fmt --check
        working-directory: ./c-polars
      - name: Rust smoke tests (C ABI safety)
        run: cargo test
        working-directory: ./c-polars

  test:
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        julia-version: ["1.10", "1"]

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./c-polars"
      - name: Build libpolars
        run: cargo build --verbose
        working-directory: ./c-polars
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-runtest@v1
        with:
          coverage: true
      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.julia-version == '1'
      - uses: codecov/codecov-action@v4
        if: matrix.julia-version == '1'
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  docs:
    runs-on: "ubuntu-latest"
    needs: test
    if: github.event_name == 'push'

    # This job needs permission to push the built site to the gh-pages branch.
    permissions:
      contents: write
      pages: write
      id-token: write
      statuses: write

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./c-polars"
      - name: Build libpolars
        run: cargo build --verbose
        working-directory: ./c-polars
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - uses: julia-actions/cache@v2
      - name: Build and deploy docs
        uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
          JULIA_DEBUG: "Documenter"
